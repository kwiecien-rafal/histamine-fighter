services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=histamine
      - POSTGRES_PASSWORD=histamine
      - POSTGRES_DB=histamine
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U histamine -d histamine"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      # Persist the downloaded embedding model so it is fetched once, not on
      # every container recreate (see FASTEMBED_CACHE_PATH below).
      - fastembed_cache:/app/.cache/fastembed
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://histamine:histamine@db:5432/histamine
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      # Cloud-provider keys for the server-side LLM paths (composer, daily cron,
      # Learn). The container never reads the root .env, so they are forwarded here.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CORS_ORIGINS=["http://localhost:5173","http://127.0.0.1:5173"]
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gpt-oss:20b}
      # Lifts HuggingFace's anonymous rate limit on the embedding-model download
      # at startup. Optional; read from the root .env. huggingface_hub reads this
      # env var directly, so no app config is involved.
      - HF_TOKEN=${HF_TOKEN:-}
      # Pin fastembed's cache to the persisted volume above; without this it
      # defaults to /tmp and re-downloads the model on every container recreate.
      - FASTEMBED_CACHE_PATH=/app/.cache/fastembed
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - VITE_API_PROXY=http://backend:8000
    depends_on:
      - backend

volumes:
  db_data:
  fastembed_cache:
